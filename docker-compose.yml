services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-csp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csp_password}
      POSTGRES_DB: ${POSTGRES_DB:-csp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-csp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432" # host:container — 5433 avoids clashing with a local Postgres

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build: .
    env_file: .env
    environment:
      # Override hosts so the API reaches the containers, not localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-csp}:${POSTGRES_PASSWORD:-csp_password}@db:5432/${POSTGRES_DB:-csp}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    # The frontend lives in a separate repo; clone it as a sibling folder
    # named `frontend` next to this backend repo (see README).
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
